services:
  - type: web
    name: graphql-engine
    env: docker
    dockerfilePath: ./consumer/Dockerfile
    envVars:
      - key: HASURA_GRAPHQL_METADATA_DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: HASURA_GRAPHQL_ENABLE_CONSOLE
        value: true
      - key: HASURA_GRAPHQL_UNAUTHORIZED_ROLE
        value: anonymous
      - key: HASURA_GRAPHQL_DEV_MODE
        value: true
      - key: HASURA_GRAPHQL_ENABLED_LOG_TYPES
        value: startup, http-log, webhook-log, websocket-log, query-log
      - key: HASURA_GRAPHQL_ADMIN_SECRET
        sync: false
      - key: HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES
        value: true
      - key: PINATA_AUTH
        sync: false

  - type: worker
    name: resolver-consumer
    env: docker
    dockerfilePath: ./consumer/Dockerfile
    dockerCommand: ./consumer --mode resolver
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: CONSUMER_TYPE
        value: sqs
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: INDEXING_SOURCE
        value: substreams
      - key: IPFS_GATEWAY_URL
        value: https://ipfs.io
      - key: RUST_LOG
        value: info

  - type: worker
    name: decoded-consumer
    env: docker
    dockerfilePath: ./consumer/Dockerfile
    dockerCommand: ./consumer --mode decoded
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: CONSUMER_TYPE
        value: sqs
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: INDEXING_SOURCE
        value: substreams
      - key: IPFS_GATEWAY_URL
        value: https://ipfs.io
      - key: RUST_LOG
        value: info

  - type: worker
    name: raw-consumer
    env: docker
    dockerfilePath: ./consumer/Dockerfile
    dockerCommand: ./consumer --mode raw
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: CONSUMER_TYPE
        value: sqs
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: INDEXING_SOURCE
        value: substreams
      - key: IPFS_GATEWAY_URL
        value: https://ipfs.io
      - key: RUST_LOG
        value: info

databases:
  - name: database
    databaseName: storage
    user: testuser
    ipAllowList: []
