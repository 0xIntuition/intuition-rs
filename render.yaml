services:

  - type: web
    name: hasura
    runtime: image
    image:
      url: docker.io/hasura/graphql-engine:v2.44.0
    dockerCommand: graphql-engine serve --server-port $PORT
    plan: starter
    envVars:
    - key: HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES
      value: true
    - key: HASURA_GRAPHQL_UNAUTHORIZED_ROLE
      value: anonymous
    - key: HASURA_GRAPHQL_ADMIN_SECRET
      sync: false
    - key: HASURA_GRAPHQL_ENABLE_CONSOLE
      value: true
    - key: PINATA_AUTH
      sync: false
    - key: HASURA_GRAPHQL_METADATA_DATABASE_URL
      fromDatabase:
        name: database
        property: connectionString
    region: oregon
    healthCheckPath: /healthz
    autoDeploy: false

  ############################################################
  # Resolver Consumer
  ############################################################
  - type: worker
    plan: starter
    name: resolver-consumer
    runtime: image
    image:
      url: docker.io/leboiko/intuition-be:0.2.0 
    dockerCommand: ./consumer --mode resolver
    envVars:
      - key: CONSUMER_TYPE
        value: sqs
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: ENS_CONTRACT_ADDRESS
        value: 0x00000000000C2E074eC69A0dFb2997BA6C7d2e1e
      - key: IMAGE_GUARD_URL
        value: http://image-guard:3000
      - key: IPFS_UPLOAD_QUEUE_URL
        value: https://sqs.us-west-2.amazonaws.com/064662847354/ipfs_upload
      - key: RESOLVER_QUEUE_URL
        value: https://sqs.us-west-2.amazonaws.com/064662847354/resolver
      - key: RUST_LOG
        value: info
      - fromGroup: aws-credentials
      - fromGroup: pinata-secrets
      - fromGroup: rpc-mainnet
      - fromGroup: ipfs

  ############################################################
  # IPFS Upload Consumer
  ############################################################
  - type: worker
    plan: starter
    name: ipfs-upload-consumer
    runtime: image
    image:
      url: docker.io/leboiko/intuition-be:0.2.0 
    dockerCommand: ./consumer --mode ipfs-upload
    envVars:
      - key: CONSUMER_TYPE
        value: sqs
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: IMAGE_GUARD_URL
        value: http://image-guard:3000
      - key: IPFS_UPLOAD_QUEUE_URL
        value: https://sqs.us-west-2.amazonaws.com/064662847354/ipfs_upload
      - key: RUST_LOG
        value: info
      - fromGroup: aws-credentials
      - fromGroup: pinata-secrets
      - fromGroup: ipfs

  ############################################################
  # Decoded Consumer
  ############################################################
  - type: worker
    name: decoded-consumer
    runtime: image
    image:
      url: docker.io/leboiko/intuition-be:0.2.0
    dockerCommand: ./consumer --mode decoded
    envVars:
      - key: CONSUMER_METRICS_API_PORT
        value: 3002
      - key: CONSUMER_TYPE
        value: sqs
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: DECODED_LOGS_QUEUE_URL
        value: https://sqs.us-west-2.amazonaws.com/064662847354/decoded_logs
      - key: INTUITION_CONTRACT_ADDRESS
        value: 430BbF52503Bd4801E51182f4cB9f8F534225DE5
      - key: RUST_LOG
        value: info
      - fromGroup: aws-credentials
      - fromGroup: pinata-secrets

  ############################################################
  # Raw Consumer
  ############################################################
  - type: worker
    name: raw-consumer
    runtime: image
    image:
      url: docker.io/leboiko/intuition-be:0.2.0
    dockerCommand: ./consumer --mode raw
    envVars:
      - key: CONSUMER_TYPE
        value: sqs
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: DECODED_LOGS_QUEUE_URL
        value: https://sqs.us-west-2.amazonaws.com/064662847354/decoded_logs
      - key: INDEXING_SOURCE
        value: substreams
      - key: RAW_CONSUMER_QUEUE_URL
        value: https://sqs.us-west-2.amazonaws.com/064662847354/raw_logs
      - key: RUST_LOG
        value: info
      - fromGroup: aws-credentials
      - fromGroup: pinata-secrets
      - fromGroup: rpc-mainnet
      - fromGroup: ipfs

