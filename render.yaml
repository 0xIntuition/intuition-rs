  # Image Guard API
  - type: web
    name: image-guard
    runtime: image
    image:
      url: ghcr.io/0xintuition/image-guard:latest
    envVars:
      - key: API_PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: FLAG_HF_CLASSIFICATION
        value: true
      - key: HF_TOKEN
        sync: false
      - fromGroup: ipfs
      - fromGroup: pinata-secrets

databases:
  - name: database
    databaseName: storage
    user: testuser
    ipAllowList: []

envVarGroups:
  - name: aws-credentials
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-west-2

  - name: hasura-secrets
    envVars:
      - key: HASURA_GRAPHQL_ADMIN_SECRET
        generateValue: true
      - key: PINATA_AUTH
        sync: false

  - name: pinata-secrets
    envVars:
      - key: PINATA_API_JWT
        sync: false
      - key: PINATA_GATEWAY_TOKEN
        sync: false

  - name: rpc-mainnet
    envVars:
      - key: RPC_URL_BASE_MAINNET
        sync: false
      - key: RPC_URL_MAINNET
        sync: false
  
  - name: ipfs
    envVars:
      - key: IPFS_GATEWAY_URL
        value: https://ipfs.io
      - key: IPFS_UPLOAD_URL
        value: https://ipfs.io
