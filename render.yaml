services:

  - type: web
    name: hasura
    runtime: image
    image:
      url: docker.io/hasura/graphql-engine:v2.44.0
    dockerCommand: graphql-engine serve --server-port $PORT
    plan: starter
    envVars:
    - key: HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES
      value: true
    - key: HASURA_GRAPHQL_UNAUTHORIZED_ROLE
      value: anonymous
    - key: HASURA_GRAPHQL_ADMIN_SECRET
      sync: false
    - key: HASURA_GRAPHQL_ENABLE_CONSOLE
      value: true
    - key: PINATA_AUTH
      sync: false
    - key: HASURA_GRAPHQL_METADATA_DATABASE_URL
      fromDatabase:
        name: database
        property: connectionString
    region: oregon
    healthCheckPath: /healthz
    autoDeploy: false
  
  - type: worker
    plan: starter
    name: resolver-consumer
    runtime: image
    image:
      url: docker.io/leboiko/intuition-be:0.2.0 
    dockerCommand: ./consumer --mode resolver
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: CONSUMER_TYPE
        value: sqs
      - key: INDEXING_SOURCE
        value: substreams
      - key: IPFS_GATEWAY_URL
        value: https://ipfs.io
      - key: RUST_LOG
        value: info
      - fromGroup: aws-credentials
      - fromGroup: pinata-secrets

  - type: worker
    name: decoded-consumer
    runtime: image
    image:
      url: docker.io/leboiko/intuition-be:0.2.0
    dockerCommand: ./consumer --mode decoded
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: CONSUMER_TYPE
        value: sqs
      - key: INDEXING_SOURCE
        value: substreams
      - key: IPFS_GATEWAY_URL
        value: https://ipfs.io
      - key: RUST_LOG
        value: info
      - fromGroup: aws-credentials
      - fromGroup: pinata-secrets

  - type: worker
    name: raw-consumer
    runtime: image
    image:
      url: docker.io/leboiko/intuition-be:0.2.0
    dockerCommand: ./consumer --mode raw
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: CONSUMER_TYPE
        value: sqs
      - key: INDEXING_SOURCE
        value: substreams
      - key: IPFS_GATEWAY_URL
        value: https://ipfs.io
      - key: RUST_LOG
        value: info
      - fromGroup: aws-credentials
      - fromGroup: pinata-secrets

databases:
  - name: database
    databaseName: storage
    user: testuser
    ipAllowList: []

envVarGroups:
  - name: aws-credentials
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-west-2

  - name: hasura-secrets
    envVars:
      - key: HASURA_GRAPHQL_ADMIN_SECRET
        generateValue: true
      - key: PINATA_AUTH
        sync: false

  - name: pinata-secrets
    envVars:
      - key: PINATA_API_JWT
        sync: false
      - key: PINATA_GATEWAY_TOKEN
        sync: false
